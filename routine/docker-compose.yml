services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: habitos
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    image: habitos-back
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_USERNAME: ${DATABASE_USERNAME}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
    depends_on:
      - postgres

  frontend:
    image: habitos-front
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data: